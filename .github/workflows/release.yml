name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (prerelease, patch, minor, major)'
        required: true
        default: 'prerelease'
      distTag:
        description: 'npm dist-tag (next, latest)'
        required: true
        default: 'next'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm pack:cli
      - run: bash scripts/test-e2e.sh
      - run: |
          git config user.name "snipl release"
          git config user.email "release@snipl.dev"
          npm version ${{ github.event.inputs.version }} --workspaces --include-workspace-root
          git push --follow-tags
      - run: pnpm publish -r --provenance --access public --tag ${{ github.event.inputs.distTag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
